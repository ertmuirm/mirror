name: iOSMirror
options:
  bundleIdPrefix: com.iosmirror
  deploymentTarget:
    iOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_BITCODE: NO
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""

targets:
  iOSMirror:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
      - path: SupportingFiles
      - path: Assets.xcassets
        type: folder
      - path: iOSMirror.app/PlugIns
        type: folder
        buildPhase: none
      - path: iOSMirror.app/Frameworks
        type: folder
        buildPhase: none
      - path: iOSMirror.app/CastFrameworkAssets.bundle
        type: folder
        buildPhase: none
    settings:
      base:
        INFOPLIST_FILE: SupportingFiles/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.iosmirror
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        OTHER_LDFLAGS:
          - "-ObjC"

schemes:
  iOSMirror:
    build:
      targets:
        iOSMirror: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release