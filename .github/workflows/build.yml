name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          # Build the app directly - outputs to DerivedData
          xcodebuild -scheme iOSMirror \
            -configuration Release \
            -destinationgeneric-platform=name=iPhone\ OS \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.iosmirror \
            build

      - name: Package as IPA
        run: |
          # Find the built app in DerivedData - the build puts it directly there
          BUILD_DIR="$HOME/Library/Developer/Xcode/DerivedData/iOSMirror-*/Build/Products/Release-iphoneos"
          BUILD_APP=$(ls -d $BUILD_DIR/iOSMirror.app 2>/dev/null | head -1)
          
          if [ -z "$BUILD_APP" ] || [ ! -d "$BUILD_APP" ]; then
            # Try alternate location
            BUILD_APP=$(find "$HOME/Library/Developer/Xcode/DerivedData" -name "iOSMirror.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -z "$BUILD_APP" ] || [ ! -d "$BUILD_APP" ]; then
            echo "Error: iOSMirror.app not found"
            ls -la "$HOME/Library/Developer/Xcode/DerivedData/"
            exit 1
          fi
          
          echo "Found app at: $BUILD_APP"
          
          mkdir -p Payload
          cp -r "$BUILD_APP" Payload/
          
          # Embed the broadcast extension
          mkdir -p Payload/iOSMirror.app/PlugIns
          cp -r iOSMirror.app/PlugIns/"Cast Screen Mirror.appex" Payload/iOSMirror.app/PlugIns/
          
          # Copy frameworks
          mkdir -p Payload/iOSMirror.app/Frameworks
          cp -r iOSMirror.app/Frameworks/* Payload/iOSMirror.app/Frameworks/
          
          # Copy CastFrameworkAssets.bundle
          cp -r iOSMirror.app/CastFrameworkAssets.bundle Payload/iOSMirror.app/
          
          chmod +x Payload/iOSMirror.app/iOSMirror
          
          # Package as IPA
          zip -r iOSMirror.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOSMirror
          path: iOSMirror.ipa
          retention-days: 30
