name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Build (unsigned)
        run: |
          xcodebuild archive -scheme iOSMirror -configuration Release -archivePath ./build/iOSMirror.xarchive CODE_SIGNING_ALLOWED=NO \

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r ./build/iOSMirror.xarchive/Products/Applications/iOSMirror.app Payload/
          chmod +x Payload/iOSMirror.app/iOSMirror
          zip -r iOSMirror.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOSMirror
          path: iOSMirror.ipa
          retention-days: 30
