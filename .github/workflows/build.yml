name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild archive -scheme iOSMirror \
            -configuration Release \
            -archivePath ./build/iOSMirror.xarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.iosmirror

      - name: Package as IPA
        run: |
          # The archive is at ./build/iOSMirror.xarchive
          ARCHIVE_PATH="./build/iOSMirror.xarchive"
          
          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "Error: Archive not found at $ARCHIVE_PATH"
            exit 1
          fi
          
          # Find the app inside the archive
          mkdir -p Payload
          cp -r "$ARCHIVE_PATH/Products/Applications/iOSMirror.app" Payload/
          
          # Embed the broadcast extension from iOSMirror.app/PlugIns
          mkdir -p Payload/iOSMirror.app/PlugIns
          cp -r iOSMirror.app/PlugIns/"Cast Screen Mirror.appex" Payload/iOSMirror.app/PlugIns/
          
          # Copy frameworks from iOSMirror.app/Frameworks
          mkdir -p Payload/iOSMirror.app/Frameworks
          cp -r iOSMirror.app/Frameworks/* Payload/iOSMirror.app/Frameworks/
          
          # Copy CastFrameworkAssets.bundle
          cp -r iOSMirror.app/CastFrameworkAssets.bundle Payload/iOSMirror.app/
          
          # Ensure executable
          chmod +x Payload/iOSMirror.app/iOSMirror
          
          # Package as IPA
          zip -r iOSMirror.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOSMirror
          path: iOSMirror.ipa
          retention-days: 30
